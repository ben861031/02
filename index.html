<style>

input{

table{

.cart-btn-top{

.cart-badge{

.overlay{

.overlay.show{display:block}

width:400px;

}

<script>

let isAdmin = false;
let currentUser = "";
let currentCategory = "全部";
let editMode = false;
let cart = [];
let requests = [];
let reviewHistory = [];

const categories = {
"筆類":["藍色原子筆","紅色原子筆","自動鉛筆","螢光筆","油性簽字筆"],
"便條紙類":["黃色便利貼","彩色便利貼","索引標籤","便條紙本","透明標籤貼"],
"紙張類":["A4影印紙","A3影印紙","牛皮紙","色紙","標籤貼紙"],
"資料夾類":["L夾","資料簿","風琴夾","公文夾","透明文件袋"],
"辦公用品類":["剪刀","膠帶台","訂書機","迴紋針","美工刀"]
};


let stockItems = [

{
name:"藍色原子筆",
category:"筆類",
price:20,
qty:50,
safe:10,
hidden:false,
image:"https://cdn-icons-png.flaticon.com/512/2991/2991148.png"
},

{
name:"紅色原子筆",
category:"筆類",
price:20,
qty:50,
safe:10,
hidden:false,
image:"https://cdn-icons-png.flaticon.com/512/2991/2991148.png"
},

{
name:"自動鉛筆",
category:"筆類",
price:35,
qty:40,
safe:10,
hidden:false,
image:"https://cdn-icons-png.flaticon.com/512/2991/2991148.png"
},

{
name:"螢光筆",
category:"筆類",
price:45,
qty:35,
safe:10,
hidden:false,
image:"https://cdn-icons-png.flaticon.com/512/2991/2991148.png"
},

{
name:"黃色便利貼",
category:"便條紙類",
price:50,
qty:60,
safe:10,
hidden:false,
image:"https://cdn-icons-png.flaticon.com/512/2991/2991148.png"
},

{
name:"彩色便利貼",
category:"便條紙類",
price:65,
qty:45,
safe:10,
hidden:false,
image:"https://cdn-icons-png.flaticon.com/512/2991/2991148.png"
},

{
name:"A4影印紙",
category:"紙張類",
price:120,
qty:40,
safe:10,
hidden:false,
image:"https://cdn-icons-png.flaticon.com/512/2991/2991148.png"
},

{
name:"A3影印紙",
category:"紙張類",
price:180,
qty:20,
safe:10,
hidden:false,
image:"https://cdn-icons-png.flaticon.com/512/2991/2991148.png"
},

{
name:"L夾",
category:"資料夾類",
price:25,
qty:70,
safe:10,
hidden:false,
image:"https://cdn-icons-png.flaticon.com/512/2991/2991148.png"
},

{
name:"資料簿",
category:"資料夾類",
price:90,
qty:25,
safe:10,
hidden:false,
image:"https://cdn-icons-png.flaticon.com/512/2991/2991148.png"
},

{
name:"剪刀",
category:"辦公用品類",
price:120,
qty:15,
safe:5,
hidden:false,
image:"https://cdn-icons-png.flaticon.com/512/2991/2991148.png"
},

{
name:"訂書機",
category:"辦公用品類",
price:180,
qty:10,
safe:5,
hidden:false,
image:"https://cdn-icons-png.flaticon.com/512/2991/2991148.png"
}

];


Object.entries(categories).forEach(([cat,items])=>{

items.forEach(item=>{

stockItems.push({
name:item,
category:cat,
price:30,
qty:50,
safe:10,
hidden:false,
image:"https://images.unsplash.com/photo-1586282391129-76a6df230234?q=80&w=800&auto=format&fit=crop"
});

});

});



function logout(){

localStorage.removeItem("stationeryName");
localStorage.removeItem("stationeryDept");

location.reload();
}

function showPage(id){

if(!isAdmin && ["stock","review","reviewHistory"].includes(id)){
alert("您沒有權限");
return;
}

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById(id).classList.add("active");
}

function renderCategories(){

const area = document.getElementById("categoryArea");

area.innerHTML = "";

const cats = ["全部",...new Set(stockItems.map(i=>i.category))];

cats.forEach(cat=>{

area.innerHTML += `
<button
class="category-btn ${currentCategory===cat?'active':''}"
onclick="filterCategory('${cat}')">

${cat}

</button>
`;
});
}

function filterCategory(cat){

currentCategory = cat;

renderCategories();
renderProducts();
}

function renderProducts(){

const area = document.getElementById("productArea");

area.innerHTML = "";

let filtered = stockItems.filter(i=>!i.hidden);

if(currentCategory !== "全部"){
filtered = filtered.filter(i=>i.category===currentCategory);
}

filtered.forEach(item=>{

const index = stockItems.indexOf(item);

area.innerHTML += `
<div class="product-card">

<img src="${item.image}">

<h3>${item.name}</h3>

<p>📂 ${item.category}</p>

<div class="price">
NT$ ${item.price}
</div>

<p>庫存：${item.qty}</p>

<input type="number"
id="qty_${index}"
value="1"
min="1">

<br><br>

<button class="action-btn blue"
style="width:100%;"
onclick="addToCart(${index})">

加入購物車

</button>

</div>
`;
});
}

function addToCart(index){

const qty = Number(document.getElementById(`qty_${index}`).value);

if(stockItems[index].qty < qty){
alert("庫存不足");
return;
}

cart.push({
item:stockItems[index].name,
price:stockItems[index].price,
qty,
subtotal:stockItems[index].price * qty
});

renderCart();
}

function renderCart(){

const table = document.getElementById("cartTable");

table.innerHTML = "";

let total = 0;

cart.forEach((c,index)=>{

total += c.subtotal;

table.innerHTML += `
<tr>

<td>${c.item}</td>
<td>${c.qty}</td>
<td>NT$ ${c.subtotal}</td>

<td>

<button class="action-btn red"
onclick="removeCart(${index})">

X

</button>

</td>

</tr>
`;
});

document.getElementById("cartTotal").innerText = total;
document.getElementById("cartBadge").innerText = cart.length;
}

function removeCart(index){

cart.splice(index,1);

renderCart();
}

function toggleCart(){

document.getElementById("overlay").classList.toggle("show");
document.getElementById("cartPanel").classList.toggle("show");
}

async function submitCart(){

if(cart.length===0){
alert("購物車沒有商品");
return;
}

const total = cart.reduce((sum,i)=>sum+i.subtotal,0);

requests.unshift({
applicant:currentUser,
items:[...cart],
total,
status:"待審核",
datetime:new Date().toLocaleString()
});

cart=[];

renderCart();
renderTables();

try{

if(window.db){

const newRequest = {
applicant:currentUser,
items:[...cart],
total,
status:"待審核",
datetime:new Date().toLocaleString()
};


const docRef = await window.fbAddDoc(
window.fbCollection(window.db,"requests"),
newRequest
);

// 回寫 firebaseId 到本地 requests
requests[0].firebaseId = docRef.id;


}

}catch(e){

console.error("Firestore同步失敗",e);

}

alert("送出成功");

toggleCart();
}

function toggleDetail(id){

const el = document.getElementById(id);

el.style.display =
el.style.display === "block"
? "none"
: "block";
}

function cancelRequest(index){

if(requests[index].status !== "待審核"){
alert("已核准或已退回，無法抽單");
return;
}

requests[index].status = "已作廢";

renderTables();
}



function printReceipt(index){

const r = requests[index];

if(!r || !r.items){

alert("找不到簽領單資料");
return;
}

const wsData = [];

wsData.push(["文具簽領單"]);
wsData.push([]);
wsData.push(["申請人", r.applicant]);
wsData.push(["申請日期", r.datetime]);
wsData.push([]);

wsData.push(["品項","數量","金額"]);

r.items.forEach(i=>{

wsData.push([
i.item,
i.qty,
i.subtotal
]);

});

wsData.push([]);
wsData.push(["總金額", "", r.total]);
wsData.push([]);
wsData.push(["申請人簽名："]);
wsData.push([]);
wsData.push(["管理者簽名："]);

const wb = XLSX.utils.book_new();

const ws = XLSX.utils.aoa_to_sheet(wsData);

ws["!cols"] = [
{wch:30},
{wch:15},
{wch:15}
];

XLSX.utils.book_append_sheet(wb, ws, "簽領單");

XLSX.writeFile(
wb,
`文具簽領單_${r.applicant.replace(/\//g,'_')}.xlsx`
);
}



async function approve(index){

try{

const req = requests[index];

if(!req) return;

req.status = "已核准";

// Firebase 同步
if(req.firebaseId && window.db){

await window.fbUpdateDoc(
window.fbDoc(window.db,"requests",req.firebaseId),
{
status:"已核准"
}
);

}

// 審核紀錄
reviewHistory.unshift({
datetime:new Date().toLocaleString(),
applicant:req.applicant,
result:"已核准",
reviewer:currentUser
});

renderTables();

}catch(e){

console.error(e);
alert("核准失敗");

}

}


async function reject(index){

requests[index].status = "已退回";

reviewHistory.unshift({
datetime:new Date().toLocaleString(),
applicant:requests[index].applicant,
result:"已退回",
reviewer:currentUser
});

renderTables();
}

function renderTables(){

const review = document.getElementById("reviewTable");
const record = document.getElementById("recordTable");
const history = document.getElementById("reviewHistoryTable");

review.innerHTML = "";
record.innerHTML = "";
history.innerHTML = "";

requests.forEach((r,index)=>{

const items = r.items.map(i=>
`• ${i.item} x ${i.qty}<br>`
).join("");

if(isAdmin && r.status==="待審核"){

review.innerHTML += `
<tr>

<td>${r.datetime}</td>

<td>${r.applicant}</td>

<td style="text-align:left;">
${items}
</td>

<td>NT$ ${r.total}</td>

<td>${r.status}</td>

<td>

<button class="action-btn green"
onclick="approve(${index})">

核准

</button>

<button class="action-btn red"
onclick="reject(${index})">

退回

</button>

<br><br>

${r.status==="已核准" ? `
<button class="print-btn"
onclick="printReceipt(${index})">

下載簽領單Excel

</button>
` : ''}

</td>

</tr>
`;
}

if(r.applicant === currentUser){

record.innerHTML += `
<tr>

<td>${r.datetime}</td>

<td>${r.applicant}</td>

<td>NT$ ${r.total}</td>

<td>${r.status}</td>

<td>

<button class="action-btn blue"
onclick="toggleDetail('detail_${index}')">

查看內容

</button>

<div class="details-box" id="detail_${index}">

${items}

</div>

</td>

<td>

${r.status==="待審核" ? `
<button class="action-btn red"
onclick="cancelRequest(${index})">

抽單作廢

</button>
` : '-'}

</td>

</tr>
`;
}

});

function renderStock(){

const table = document.getElementById("stockTable");

table.innerHTML = "";

stockItems.forEach((item,index)=>{

const status = item.qty <= item.safe
? "⚠️不足"
: "正常";

table.innerHTML += `
<tr class="${item.hidden ? 'hidden-row':''}">

<td>
<input type="text"
value="${item.category}"
${editMode?'':'disabled'}
class="${editMode?'':'disabled-input'}"
onchange="updateCategory(${index},this.value)">
</td>

<td>
<input type="text"
value="${item.name}"
${editMode?'':'disabled'}
class="${editMode?'':'disabled-input'}"
onchange="updateName(${index},this.value)">
</td>

<td>
<input type="number"
value="${item.price}"
${editMode?'':'disabled'}
class="${editMode?'':'disabled-input'}"
onchange="updatePrice(${index},this.value)">
</td>

<td>

<img src="${item.image}"
style="width:80px;height:80px;object-fit:contain;border-radius:10px;">

<br><br>

<input type="file"
accept="image/*"
onchange="uploadImage(${index},event)">

</td>

<td>
<input type="number"
value="${item.qty}"
${editMode?'':'disabled'}
class="${editMode?'':'disabled-input'}"
onchange="updateQty(${index},this.value)">
</td>

<td>
<input type="number"
value="${item.safe}"
${editMode?'':'disabled'}
class="${editMode?'':'disabled-input'}"
onchange="updateSafe(${index},this.value)">
</td>

<td>${status}</td>

<td>

<button class="action-btn blue"
onclick="addInventory(${index})">

進貨

</button>

<br><br>

<button class="action-btn gray"
onclick="toggleHidden(${index})">

${item.hidden ? '恢復':'隱藏'}

</button>

</td>

</tr>
`;
});
}

function toggleEditMode(){

editMode = !editMode;

document.getElementById("editBtn").innerText =
editMode ? "關閉編輯" : "開啟編輯";

renderStock();
}

function updateCategory(index,val){
stockItems[index].category = val;
renderCategories();
renderProducts();
}

function updateName(index,val){
stockItems[index].name = val;
renderProducts();
}

function updatePrice(index,val){
stockItems[index].price = Number(val);
renderProducts();
}

function updateQty(index,val){
stockItems[index].qty = Number(val);
renderProducts();
renderStock();
}

function updateSafe(index,val){
stockItems[index].safe = Number(val);
renderStock();
}

function uploadImage(index,event){

const file = event.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

stockItems[index].image = e.target.result;

renderProducts();
renderStock();
};

reader.readAsDataURL(file);
}

function addInventory(index){

const qty = prompt("請輸入進貨數量");

if(qty){

stockItems[index].qty += Number(qty);

renderProducts();
renderStock();
}
}

function toggleHidden(index){

stockItems[index].hidden = !stockItems[index].hidden;

renderProducts();
renderStock();
}

renderCategories();
renderProducts();
renderCart();
renderStock();

<script>

async function loadCloudRequests(){

const snapshot = await window.fbGetDocs(
window.fbCollection(window.db,"requests")
);

requests = [];

snapshot.forEach(docSnap=>{

requests.push({
firebaseId:docSnap.id,
...docSnap.data()
});

});
